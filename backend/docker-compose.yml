services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: dia_del_nino
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/dia_del_nino
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ../shared:/shared
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: python -m app.worker.run
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/dia_del_nino
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app
      - ../shared:/shared
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
