# Salesforce Marketing Cloud is the only persistent store for this project - there is
# no database, by explicit requirement (personal/child data must never live anywhere
# except the Data Extension). See app/salesforce.py.
#
# TEMP (free tier for now, no card on file - revert once on a paid plan): this
# blueprint normally also has a `worker` service (RQ background worker) and a `cron`
# service (stale pending_upload cleanup), plus a `redis` service for the job queue and
# rate limiting. None of those have a free tier on Render. They're removed here rather
# than commented out - a pre-free-tier version (with worker/cron/redis) is in git
# history for reference, though it also predates the no-database redesign and would
# need updating either way. The app code has matching TEMP bypasses
# (app/routers/submissions.py runs the moderation/Salesforce jobs in-process via
# BackgroundTasks instead of enqueueing to Redis; app/rate_limit.py uses in-memory
# storage instead of Redis) that need reverting alongside this file.
services:
  - type: web
    name: formulario-web
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: UPLOAD_TOKEN_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Fill in once the real subdomain/custom domain is assigned - defaults to
      # localhost only, which would CORS-block the deployed frontend. The default
      # CORS_ALLOW_ORIGIN_REGEX (https://.*\.vercel\.app) already covers the raw
      # Vercel preview/prod URL, but not a custom Tienda Inglesa subdomain.
      - key: CORS_ALLOW_ORIGINS
        sync: false
      # Salesforce Marketing Cloud - set SFMC_ENABLED=true for the app to actually do
      # anything (it's the only store); left toggleable for local/test convenience.
      - key: SFMC_ENABLED
        sync: false
      - key: SFMC_SUBDOMAIN
        sync: false
      - key: SFMC_CLIENT_ID
        sync: false
      - key: SFMC_CLIENT_SECRET
        sync: false
      - key: SFMC_DATA_EXTENSION_KEY
        sync: false
      # DE de adultos (etapa 1, sendable, PK Cedula_Adulto) - solo sync de contacto,
      # sin relación con la votación. Ver app/salesforce.py.
      - key: SFMC_ADULTS_DATA_EXTENSION_KEY
        sync: false
      # Votación (etapa 2) - ver app/salesforce.py, routers/votes.py y routers/jurado.py.
      - key: SFMC_VOTOS_PUBLICO_DATA_EXTENSION_KEY
        sync: false
      - key: SFMC_JURADOS_DATA_EXTENSION_KEY
        sync: false
