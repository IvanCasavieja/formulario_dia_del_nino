# TEMP (free tier for now, no card on file - revert once on a paid plan): this
# blueprint normally also has a `worker` service (RQ background worker) and a `cron`
# service (stale pending_upload cleanup), plus a `redis` service backing both the job
# queue and rate limiting. None of those have a free tier on Render. They're removed
# here rather than commented out - the pre-free-tier version (with worker/cron/redis
# and the paid db/redis plans) is in git history on the commit before this one; restore
# from there when a paid plan exists. The app code has matching TEMP bypasses
# (app/routers/submissions.py runs the moderation/Salesforce jobs in-process via
# BackgroundTasks instead of enqueueing to Redis; app/rate_limit.py uses in-memory
# storage instead of Redis) that need reverting alongside this file.
services:
  - type: web
    name: formulario-web
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: formulario-db
          property: connectionString
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: UPLOAD_TOKEN_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Fill in once the real subdomain/custom domain is assigned - defaults to
      # localhost only, which would CORS-block the deployed frontend. The default
      # CORS_ALLOW_ORIGIN_REGEX (https://.*\.vercel\.app) already covers the raw
      # Vercel preview/prod URL, but not a custom Tienda Inglesa subdomain.
      - key: CORS_ALLOW_ORIGINS
        sync: false
      # Salesforce Marketing Cloud - optional (SFMC_ENABLED defaults false).
      - key: SFMC_ENABLED
        sync: false
      - key: SFMC_SUBDOMAIN
        sync: false
      - key: SFMC_CLIENT_ID
        sync: false
      - key: SFMC_CLIENT_SECRET
        sync: false
      - key: SFMC_DATA_EXTENSION_KEY
        sync: false

# Postgres databases are a separate top-level section in Render's Blueprint schema,
# not another entry under `services` - `type: psql` there errors as "unknown type".
databases:
  - name: formulario-db
    plan: free
